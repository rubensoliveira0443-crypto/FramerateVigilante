name: Build FramerateVigilante (GTASA)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout plugin-sdk
        uses: actions/checkout@v4
        with:
          repository: DK22Pac/plugin-sdk
          path: plugin-sdk

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Compila o plugin-sdk para gerar o plugin.lib
      - name: Build plugin-sdk
        run: |
          $sln = Get-ChildItem -Path "plugin-sdk" -Filter "*.sln" -Recurse | Select-Object -First 1
          if ($sln) {
            Write-Host "Encontrado: $($sln.FullName)"
            msbuild "$($sln.FullName)" /p:Configuration=Release /p:Platform=Win32 /m /v:minimal
          } else {
            Write-Host "Sem .sln no plugin-sdk, pulando..."
          }
        shell: pwsh

      # Compila direto o .vcxproj (evita o problema de espaço no nome da config via .sln)
      - name: Build FramerateVigilante
        run: |
          $sdkDir  = "${{ github.workspace }}\plugin-sdk"
          $outDir  = "${{ github.workspace }}\output\"
          $intDir  = "${{ github.workspace }}\obj\"
          $vcxproj = "${{ github.workspace }}\FramerateVigilante\FramerateVigilante.vcxproj"

          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          New-Item -ItemType Directory -Force -Path $intDir | Out-Null

          msbuild "$vcxproj" `
            "/p:Configuration=GTASA Release" `
            /p:Platform=Win32 `
            "/p:PLUGIN_SDK_DIR=$sdkDir\" `
            "/p:OutDir=$outDir" `
            "/p:IntDir=$intDir" `
            /p:PlatformToolset=v143 `
            /m /v:normal
        shell: pwsh

      - name: Upload ASI
        uses: actions/upload-artifact@v4
        with:
          name: FramerateVigilante-SA
          path: ${{ github.workspace }}\output\*.asi
          if-no-files-found: error
